# ==============================================================================
# Filename:       install_opencode.yml
# Version:        1.6
# Author:         Antigravity CLI
# Last Modified:  2026-07-18
# Trac Ticket:    #3284, #3933
#
# Purpose:
#   Installs the OpenCode CLI tool (via opencode-ai package) globally via NPM 
#   on target hosts and configures environment for user 'will'.
#
# Update 1.6 (Trac #3933):
#   - Fixed: the blockinfile task hardcoded the literal placeholder string
#     "YOUR_KEY_HERE" for OPENROUTER_API_KEY on every run, silently overwriting
#     any manually-corrected key in ~/.bashrc and causing OpenRouter/OpenCode
#     "Missing Authentication header" failures. Now renders the real key from
#     vault variable `openrouter_api_key`.
#
# Update 1.5:
#   - Refactored to use the unified 'nodejs' Ansible role instead of installing npm via apt.
#
# Update 1.4:
#   - Added NPM installation for Debian/Ubuntu hosts.
#   - Fixed opencode binary resolution during verification step by explicitly providing PATH.
#
# Use Case:
#   Provides developers with the OpenCode CLI tool configured with OpenRouter.
#
# Installation Method:
#   npm install -g opencode-ai
#
# Prerequisites:
#   - Node.js/NPM installed on target hosts
#
# Configuration:
#   - /home/will/.bashrc (OPENROUTER_API_KEY)
#   - /home/will/.config/opencode/
#
# Secrets:
#   openrouter_api_key (vault.yml) — OpenRouter API key, rendered into ~/.bashrc
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/install_opencode.yml --limit athena
#
# Removal Instructions:
#   npm uninstall -g opencode-ai
#   rm -rf /home/will/.config/opencode
#   Remove OPENROUTER_API_KEY from /home/will/.bashrc
#
# WWOS:  http://wwos.home.arpa/index.php/Playbooks/install_opencode.yml
# GitHub: https://github.com/wrtaff/ansible-netbox/blob/master/playbooks/install_opencode.yml
# ==============================================================================
---
- name: Install and Configure OpenCode CLI
  hosts: "{{ target | default('desktops, agent_runners') }}"
  become: true
  gather_facts: true

  vars_files:
    - ../vault.yml

  vars:
    target_user: will
    npm_package: opencode-ai

  tasks:
    - name: Ensure Node.js and NPM are installed (via role)
      ansible.builtin.include_role:
        name: nodejs
      when: ansible_os_family == 'Debian' and inventory_hostname != 'ynh2'
      tags: install

    - name: 0. Check current OpenCode version (if any)
      ansible.builtin.command:
        cmd: opencode --version
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      register: opencode_version_before
      changed_when: false
      failed_when: false
      tags: [install, verify]

    - name: 1. Install OpenCode CLI Globally via NPM
      ansible.builtin.npm:
        name: "{{ npm_package }}"
        global: true
        state: latest
      when: inventory_hostname != 'ynh2'
      tags: install

    - name: 2. Verify OpenCode CLI is installed
      ansible.builtin.command:
        cmd: opencode --version
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      register: opencode_version_output
      changed_when: false
      tags: verify

    - name: 3. Show OpenCode Version
      ansible.builtin.debug:
        msg: >-
          OpenCode version: {{ opencode_version_output.stdout if opencode_version_output.rc == 0 else 'Failed to get version' }}
          {% if opencode_version_before.rc == 0 and opencode_version_before.stdout != opencode_version_output.stdout %}
          (updated from {{ opencode_version_before.stdout }})
          {% elif opencode_version_before.rc != 0 %}
          (fresh install)
          {% else %}
          (already up to date)
          {% endif %}
      when: opencode_version_output.rc == 0

    - name: 4. Configure .bashrc for user '{{ target_user }}'
      ansible.builtin.blockinfile:
        path: "/home/{{ target_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: OpenCode Configuration"
        block: |
          # OpenRouter API Configuration for OpenCode
          export OPENROUTER_API_KEY="{{ openrouter_api_key }}"

          # OpenAI-compatible compatibility layer (Required for many OpenCode versions)
          export OPENAI_API_BASE="https://openrouter.ai/api/v1"
          export OPENAI_API_KEY="$OPENROUTER_API_KEY"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
      tags: config

    - name: 5. Ensure OpenCode config directory exists
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/opencode"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
      tags: config
