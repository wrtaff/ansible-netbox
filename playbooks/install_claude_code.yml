# ==============================================================================
# Filename:       install_claude_code.yml
# Version:        2.1
# Author:         Gemini CLI
# Last Modified:  2026-05-20
# Context:        http://trac.home.arpa/ticket/3092
#
# Purpose:
#   Migrates Claude Code CLI from NPM to the new native installer and ensures
#   it is installed/updated on target desktop hosts.
#
# Update 2.1:
#   - Added PATH management in .bashrc for ~/.local/bin.
#   - Created /usr/local/bin/claude compatibility symlink.
#   - Removed 'creates' from installer shell command to support updates.
#
# Update 2.0:
#   - Migrated from global NPM package to native installer (install.sh).
#   - Changed target hosts to 'desktops' (including athena and limbo-bd).
#   - Added cleanup of legacy NPM package.
#   - Switched to per-user installation in ~/.local/bin.
#
# Update 1.6:
#   - Changed state from 'present' to 'latest' to allow updates.
#   - Added pre-check task to capture current version before installation.
# ==============================================================================
---
- name: Install or Update Claude Code CLI (Native)
  hosts: desktops
  become: false
  gather_facts: true

  tasks:
    - name: 1. Remove Deprecated Global NPM Installation
      become: true
      ansible.builtin.npm:
        name: "@anthropic-ai/claude-code"
        global: true
        state: absent
      tags: cleanup

    - name: 2. Ensure local bin directory exists
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin"
        state: directory
        mode: '0755'
      tags: install

    - name: 3. Install Claude Code via Native Installer
      ansible.builtin.shell:
        cmd: "curl -fsSL https://claude.ai/install.sh | bash"
      register: install_output
      tags: install

    - name: 4. Ensure ~/.local/bin is in PATH
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.bashrc"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: 'export PATH="\$HOME/.local/bin:\$PATH"'
        state: present
      tags: install

    - name: 5. Create global symlink for compatibility
      become: true
      ansible.builtin.file:
        src: "{{ ansible_user_dir }}/.local/bin/claude"
        dest: /usr/local/bin/claude
        state: link
        force: yes
      tags: install

    - name: 6. Verify Claude Code CLI is installed
      ansible.builtin.command:
        cmd: "claude --version"
      register: claude_version_output
      changed_when: false
      tags: verify

    - name: 7. Show Claude Code Version
      ansible.builtin.debug:
        msg: "Claude Code version: {{ claude_version_output.stdout }}"
      when: claude_version_output.rc == 0
      tags: verify
