# ==============================================================================
# Filename:       playbooks/provision_python_env.yml
# Version:        1.2
# Author:         Gemini CLI
# Last Modified:  2026-04-07
# Context:        http://trac.home.arpa/ticket/3085
#                 http://trac.home.arpa/ticket/3276
#
# Purpose:
#    Sets up a standardized Python virtual environment on athena.
#    Ensures scripts can run with correct dependencies.
#
# Usage:
#    ansible-playbook -i inventory.ini playbooks/provision_python_env.yml
#
# Revision History:
#    v1.0 (2026-02-18) - Initial version.
#    v1.1 (2026-02-18) - Update venv path to local /opt/venvs to fix SMB 
#                       filesystem limitations.
#    v1.2 (2026-04-07) - Added markdown==3.7.0 dependency (ticket #3276) 
#                       and updated target to athena.
# ==============================================================================

- name: Provision Common Python Environment
  hosts: athena
  gather_facts: true
  become: true  # Need root for apt and creating /opt/venvs
  
  vars:
    project_root: /home/will/gemini_projects
    venv_path: "/opt/venvs/gemini_projects"
    requirements_file: "{{ project_root }}/requirements.txt"

  tasks:
    - name: Install system dependencies for Python
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
          - python3-full
        state: present
        update_cache: yes

    - name: Create project directory with correct ownership
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: will
        group: will
        mode: '0755'

    - name: Ensure venv parent directory exists
      ansible.builtin.file:
        path: "{{ venv_path | dirname }}"
        state: directory
        owner: will
        group: will
        mode: '0755'

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: "python3 -m venv {{ venv_path }}"
        creates: "{{ venv_path }}/bin/activate"
      become_user: will

    - name: Ensure pip, setuptools, and wheel are up-to-date
      ansible.builtin.pip:
        name: 
          - pip
          - setuptools
          - wheel
          - markdown==3.7.0
        state: latest
        virtualenv: "{{ venv_path }}"
      become_user: will

    - name: Install dependencies from requirements.txt
      ansible.builtin.pip:
        requirements: "{{ requirements_file }}"
        virtualenv: "{{ venv_path }}"
      become_user: will

    - name: Verify markdown installation
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/python3 -c 'import markdown; print(markdown.__version__)'"
      register: markdown_check
      changed_when: false
      failed_when: markdown_check.rc != 0 or '3.7' not in markdown_check.stdout

    - name: Show markdown version verification
      ansible.builtin.debug:
        msg: "Verified markdown v{{ markdown_check.stdout }} is correctly installed."
