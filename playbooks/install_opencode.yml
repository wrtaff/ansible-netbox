# ==============================================================================
# Filename:       install_opencode.yml
# Version:        1.2
# Author:         Gemini CLI
# Last Modified:  2026-04-09
# Context:        http://trac.home.arpa/ticket/3284
#
# Purpose:
#   Installs the OpenCode CLI tool (via opencode-ai package) globally via NPM 
#   on target hosts and configures environment for user 'will'.
#
# Update 1.2:
#   - Pushed new playbook to GitHub.
#   - Redacted full API key from playbook to follow security standards.
#
# Update 1.1:
#   - Corrected NPM package name to 'opencode-ai'.
#   - Added task to configure .bashrc for user 'will'.
# ==============================================================================
---
- name: Install and Configure OpenCode CLI
  hosts: athena
  become: true
  gather_facts: true

  vars:
    target_user: will
    npm_package: opencode-ai

  tasks:
    - name: 0. Check current OpenCode version (if any)
      ansible.builtin.command:
        cmd: opencode --version
      register: opencode_version_before
      changed_when: false
      failed_when: false
      tags: [install, verify]

    - name: 1. Install OpenCode CLI Globally via NPM
      ansible.builtin.npm:
        name: "{{ npm_package }}"
        global: true
        state: latest
      tags: install

    - name: 2. Verify OpenCode CLI is installed
      ansible.builtin.command:
        cmd: opencode --version
      register: opencode_version_output
      changed_when: false
      tags: verify

    - name: 3. Show OpenCode Version
      ansible.builtin.debug:
        msg: >-
          OpenCode version: {{ opencode_version_output.stdout if opencode_version_output.rc == 0 else 'Failed to get version' }}
          {% if opencode_version_before.rc == 0 and opencode_version_before.stdout != opencode_version_output.stdout %}
          (updated from {{ opencode_version_before.stdout }})
          {% elif opencode_version_before.rc != 0 %}
          (fresh install)
          {% else %}
          (already up to date)
          {% endif %}
      when: opencode_version_output.rc == 0

    - name: 4. Configure .bashrc for user '{{ target_user }}'
      ansible.builtin.blockinfile:
        path: "/home/{{ target_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: OpenCode Configuration"
        block: |
          # OpenRouter API Configuration for OpenCode
          # Replace 'YOUR_KEY_HERE' with your actual key from openrouter.ai/settings/keys
          export OPENROUTER_API_KEY="YOUR_KEY_HERE"
          
          # OpenAI-compatible compatibility layer (Required for many OpenCode versions)
          export OPENAI_API_BASE="https://openrouter.ai/api/v1"
          export OPENAI_API_KEY="$OPENROUTER_API_KEY"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
      tags: config

    - name: 5. Ensure OpenCode config directory exists
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/opencode"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
      tags: config
