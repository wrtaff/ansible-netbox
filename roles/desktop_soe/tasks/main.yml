---
# roles/desktop_soe/tasks/main.yml
# Trac Ticket: #3214
# Purpose: Desktop SOE tasks (non-role-based)

- name: 1. Install standard desktop packages
  ansible.builtin.apt:
    name:
      - vlc
      - screen
      - python3-venv
      - neovim
      - x2goserver
      - x2goserver-xsession
      - imagemagick
      - ghostscript
      - pdfarranger
    state: present
    update_cache: yes

- name: 1b. Locate ImageMagick policy.xml file
  ansible.builtin.shell:
    cmd: "find /etc -maxdepth 3 -type f -name policy.xml | grep 'ImageMagick' | head -n 1"
  register: policy_file_find
  changed_when: false
  failed_when: policy_file_find.stdout == ""

- name: 1c. Update ImageMagick policy to allow PDF reading and writing
  ansible.builtin.lineinfile:
    path: "{{ policy_file_find.stdout | trim }}"
    regexp: '(<policy domain="coder" rights="none" pattern="PDF" />)'
    line: '<policy domain="coder" rights="read|write" pattern="PDF" />'
    state: present

- name: 2. Install Claude Code CLI globally via NPM
  ansible.builtin.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: latest

- name: 3. Prevent system sleep/suspend
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: '^{{ item.regexp_prefix }}'
    line: '{{ item.line_content }}'
    state: present
  loop:
    - { regexp_prefix: '#?HandlePowerKey', line_content: 'HandlePowerKey=ignore' }
    - { regexp_prefix: '#?HandleSuspendKey', line_content: 'HandleSuspendKey=ignore' }
    - { regexp_prefix: '#?HandleHibernateKey', line_content: 'HandleHibernateKey=ignore' }
    - { regexp_prefix: '#?IdleAction', line_content: 'IdleAction=none' }
    - { regexp_prefix: '#?HandleLidSwitch', line_content: 'HandleLidSwitch=ignore' }
  notify: Restart systemd-logind
