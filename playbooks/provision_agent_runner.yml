---
# Filename:       playbooks/provision_agent_runner.yml
# Version:        1.1
# Author:         Antigravity
# Last Modified:  2026-07-08
# Trac Ticket:    #3774
#
# Purpose:
#     Unified playbook to fully provision a new AI agent runner LXC container
#     (or bare metal host). Automates repository cloning, bashrc templating with secrets,
#     agent installations, and netbox registration.
#
# Update 1.1:
#     - Synced with upstream playbooks 2026-07-08 to fix sudo timeouts and npm pathing.
#
# Use Case:
#     Eliminates configuration drift and manual SSH steps when scaling the agent fleet.
#
# Installation Method:
#     Ansible playbook invoking tasks and importing component playbooks.
#
# Prerequisites:
#     Host must be accessible via SSH (usually after cloning from VMID 117 template).
#
# Configuration:
#     Templates ~/.bashrc for the `will` user.
#
# Secrets:
#                   netbox_api_token (vault.yml) — writes tags/entries to NetBox
#                   wwos_password (vault.yml)
#                   trac_password (vault.yml)
#                   nextcloud_password (vault.yml)
#                   gemini_api_key (vault.yml)
#                   anthropic_api_key (vault.yml)
#                   openrouter_api_key (vault.yml)
#
# Usage:
#     ansible-playbook -i inventory.ini playbooks/provision_agent_runner.yml --limit <host>
#
# Removal Instructions:
#     Destroy the target LXC container.
#
# WWOS:
#     http://wwos.home.arpa/index.php/Playbooks/provision_agent_runner.yml
# GitHub:
#     https://github.com/wrtaff/ansible-netbox/blob/main/playbooks/provision_agent_runner.yml

- name: Provision Agent Runner Environment
  hosts: all
  become: yes
  vars_files:
    - ../vault.yml
  vars:
    target_user: will
    target_home: "/home/{{ target_user }}"

  tasks:
    - name: Ensure target user exists
      ansible.builtin.user:
        name: "{{ target_user }}"
        shell: /bin/bash
        state: present

    - name: Deploy lab SSH public key to target user
      ansible.posix.authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ ssh_lab_pub_key }}"
        exclusive: no
      when: ssh_lab_pub_key is defined

    - name: Ensure git and rsync are installed
      ansible.builtin.apt:
        name: 
          - git
          - rsync
        state: present
        update_cache: yes

    - name: Check if pops git repository exists on target
      ansible.builtin.stat:
        path: "{{ target_home }}/pops/.git"
      register: pops_git_stat

    - name: Check if ansible-netbox git repository exists on target
      ansible.builtin.stat:
        path: "{{ target_home }}/ansible-netbox/.git"
      register: netbox_git_stat

    - name: Synchronize pops repository from control node
      ansible.posix.synchronize:
        src: "/home/will/pops/"
        dest: "{{ target_home }}/pops/"
        archive: yes
      become: no
      when: inventory_hostname != 'ynh2' or not pops_git_stat.stat.exists

    - name: Synchronize ansible-netbox repository from control node
      ansible.posix.synchronize:
        src: "/home/will/ansible-netbox/"
        dest: "{{ target_home }}/ansible-netbox/"
        archive: yes
        rsync_opts:
          - "--exclude=.venv"
      become: no
      when: inventory_hostname != 'ynh2' or not netbox_git_stat.stat.exists

    - name: Ensure repository ownership
      ansible.builtin.file:
        path: "{{ target_home }}/{{ item }}"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        recurse: yes
      loop:
        - pops
        - ansible-netbox

    - name: Ensure .config directory exists
      ansible.builtin.file:
        path: "{{ target_home }}/.config"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Template mcp-secrets.env with vault secrets
      ansible.builtin.template:
        src: mcp-secrets.env.j2
        dest: "{{ target_home }}/.config/mcp-secrets.env"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0600'

    - name: Ensure MCP secrets are sourced in .bashrc
      ansible.builtin.blockinfile:
        path: "{{ target_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: MCP Secrets"
        insertbefore: BOF
        block: |
          # Source MCP secrets so non-interactive shells get them
          if [ -f "$HOME/.config/mcp-secrets.env" ]; then
              set -a
              source "$HOME/.config/mcp-secrets.env"
              set +a
          fi
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'

    - name: Ensure Agent Runner path, aliases, and sync check are in .bashrc
      ansible.builtin.blockinfile:
        path: "{{ target_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: Agent Runner Settings"
        insertafter: EOF
        block: |
          # Paths
          export PATH="$HOME/.local/bin:$HOME/go/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          # Aliases
          alias oc='opencode'
          alias cdp='cd $HOME/pops'
          alias cdpc='clear; cd $HOME/pops; claude'
          alias cdpo='clear; cd $HOME/pops; opencode'
          alias cdpg='clear; cd $HOME/pops; agy'

          # Run agent sync check on session start (for Antigravity, OpenCode, and human sessions)
          if [ -z "$AGENT_SYNC_CHECK_DONE" ] && [ -x "$HOME/pops/scripts/agent-sync-check.sh" ]; then
              export AGENT_SYNC_CHECK_DONE=1
              "$HOME/pops/scripts/agent-sync-check.sh"
          fi
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'

    - name: Register agent runner in NetBox
      netbox.netbox.netbox_virtual_machine:
        netbox_url: "{{ netbox_url | default('http://netbox1.home.arpa:80') }}"
        netbox_token: "{{ netbox_api_token }}"
        data:
          name: "{{ inventory_hostname }}"
          cluster: "{{ netbox_cluster | default('home-cluster') }}"
          status: "active"
      delegate_to: localhost
      run_once: false
      ignore_errors: yes
      vars:
        ansible_python_interpreter: "{{ lookup('env', 'VIRTUAL_ENV') | default('/home/will/ansible-netbox/.venv', true) }}/bin/python3"

- import_playbook: install_antigravity.yml
- import_playbook: install_opencode.yml
- import_playbook: install_claude_code.yml
- import_playbook: configure_mcp_servers_remote.yml
- import_playbook: install_tmux.yml
