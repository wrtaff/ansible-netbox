---
# install_tmux.yml, Version 1.1, Will Taff, 2026-07-11, Trac #3830
# Purpose       — Install tmux terminal multiplexer and configure mouse support
# Use Case      — Replaces screen for session management
# Installation Method — apt
# Prerequisites — None
# Configuration — ~/.tmux.conf for will user (mouse support, escape-time)
# Secrets       — ansible_become_pass (vault.yml) — sudo on target hosts
# Usage         — ansible-playbook -i inventory.ini playbooks/install_tmux.yml --limit athena,ar0,ar1
# Removal Instructions — apt-get remove tmux
# WWOS          — http://wwos.home.arpa/index.php/Playbooks/install_tmux.yml
# GitHub        — https://github.com/wrtaff/ansible-netbox/blob/main/playbooks/install_tmux.yml

- name: Install tmux
  hosts: all
  become: yes
  tasks:
    - name: Ensure tmux is installed
      ansible.builtin.apt:
        name: tmux
        state: present
        update_cache: yes
      when: inventory_hostname != 'ynh2'

    - name: Configure ~/.tmux.conf for the will user
      ansible.builtin.blockinfile:
        path: "/home/will/.tmux.conf"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: tmux config"
        create: yes
        owner: "will"
        group: "will"
        mode: '0644'
        block: |
          set -g escape-time 10
          set -g mouse on
